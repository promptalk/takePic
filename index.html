<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>우리끼리 찰칵</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e42;
      --accent: #7c6ff7;
      --accent2: #a78bfa;
      --text: #e8e6f0;
      --muted: #888aa8;
      --success: #34d399;
      --error: #f87171;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .camera-icon {
      font-size: 52px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 18px #7c6ff755);
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent2) 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px #00000055;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      font-size: 17px;
      pointer-events: none;
      opacity: 0.6;
    }

    input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: var(--muted);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #7c6ff722;
    }

    /* ── Button ── */
    .btn {
      margin-top: 8px;
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--accent) 0%, #9c8bff 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px #7c6ff744;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      -webkit-appearance: none;
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px #7c6ff733;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-icon {
      font-size: 20px;
    }

    /* ── Status ── */
    .status-bar {
      margin-top: 20px;
      min-height: 44px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .status-item.show {
      opacity: 1;
      transform: translateY(0);
    }

    .status-item.success {
      border-color: #34d39944;
      color: var(--success);
    }

    .status-item.error {
      border-color: #f8717144;
      color: var(--error);
    }

    .status-item.loading {
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: currentColor;
    }

    .dot.spin {
      background: none;
      border: 2px solid currentColor;
      border-top-color: transparent;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="header">
    <span class="camera-icon">📷</span>
    <h1>우리끼리 찰칵</h1>
    <p class="subtitle">정보를 입력하고 촬영 신호를 보내세요</p>
  </div>

  <div class="card">
    <form id="picForm" autocomplete="off">

      <div class="field">
        <label for="phone">전화번호</label>
        <div class="input-wrap">
          <span class="input-icon">📱</span>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" inputmode="tel" maxlength="13"
            required />
        </div>
      </div>

      <div class="field">
        <label for="company">소속회사</label>
        <div class="input-wrap">
          <span class="input-icon">🏢</span>
          <input type="text" id="company" name="company" placeholder="회사명을 입력하세요" required />
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="btn-icon">📸</span>
        Take Pic
      </button>

    </form>

    <div class="status-bar" id="statusBar"></div>
  </div>

  <p class="footer">© 우리끼리 찰칵</p>

  <script>
    // ──────────────────────────────────────────
    // CONFIG — 환경에 맞게 수정하세요
    // ──────────────────────────────────────────
    const CONFIG = {
      // POST 엔드포인트
      postUrl: 'https://script.google.com/macros/s/AKfycbyVZr_HzIIxyoIJ9dJdIwvi5GfIk17gAFxW_jq7vGoy8FDIPtVXeIhQ68f8lYnzJJBW/exec',

      // MQTT 브로커 (WebSocket)
      mqttBroker: 'wss://mediaflow00.iptime.org:20000',
      mqttTopic: '/Snap/Command',
      mqttClientId: 'web_' + Math.random().toString(16).slice(2, 8),
    };
    // ──────────────────────────────────────────

    const form = document.getElementById('picForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusBar = document.getElementById('statusBar');
    const phoneInput = document.getElementById('phone');

    // 전화번호 자동 하이픈
    phoneInput.addEventListener('input', () => {
      let v = phoneInput.value.replace(/\D/g, '');
      if (v.length <= 3) phoneInput.value = v;
      else if (v.length <= 7) phoneInput.value = v.slice(0, 3) + '-' + v.slice(3);
      else phoneInput.value = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
    });

    function addStatus(msg, type = 'loading') {
      const item = document.createElement('div');
      item.className = 'status-item ' + type;
      item.innerHTML = `<span class="dot ${type === 'loading' ? 'spin' : ''}"></span><span>${msg}</span>`;
      statusBar.appendChild(item);
      requestAnimationFrame(() => item.classList.add('show'));
      return item;
    }

    function resolveStatus(item, msg, type) {
      item.className = 'status-item show ' + type;
      item.querySelector('.dot').className = 'dot';
      item.querySelector('span:last-child').textContent = msg;
    }

    async function sendPost(phone, company) {
      const item = addStatus('서버에 정보 전송 중…');
      try {
        // Google Apps Script는 CORS를 지원하지 않으므로 no-cors 사용
        // (응답 본문은 읽을 수 없지만 요청은 정상 전송됨)
        await fetch(CONFIG.postUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ phone, company, timestamp: new Date().toISOString() }),
        });
        resolveStatus(item, '✓ 서버 전송 완료', 'success');
        return true;
      } catch (e) {
        resolveStatus(item, '✗ 서버 전송 실패: ' + e.message, 'error');
        return false;
      }
    }

    function sendMqtt(phone, company) {
      return new Promise((resolve) => {
        const item = addStatus('MQTT 신호 전송 중…');
        try {
          const client = mqtt.connect(CONFIG.mqttBroker, {
            clientId: CONFIG.mqttClientId,
            connectTimeout: 5000,
            reconnectPeriod: 0,
          });

          const timeout = setTimeout(() => {
            resolveStatus(item, '✗ MQTT 연결 시간 초과', 'error');
            client.end(true);
            resolve(false);
          }, 6000);

          client.on('connect', () => {
            const payload = JSON.stringify({ id: '1', cmd: 'on' });
            client.publish(CONFIG.mqttTopic, payload, { qos: 1 }, (err) => {
              clearTimeout(timeout);
              if (err) {
                resolveStatus(item, '✗ MQTT 전송 실패: ' + err.message, 'error');
                resolve(false);
              } else {
                resolveStatus(item, '✓ MQTT 신호 전송 완료', 'success');
                resolve(true);
              }
              client.end();
            });
          });

          client.on('error', (err) => {
            clearTimeout(timeout);
            resolveStatus(item, '✗ MQTT 오류: ' + err.message, 'error');
            client.end(true);
            resolve(false);
          });
        } catch (e) {
          resolveStatus(item, '✗ MQTT 오류: ' + e.message, 'error');
          resolve(false);
        }
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = phoneInput.value.trim();
      const company = document.getElementById('company').value.trim();
      if (!phone || !company) return;

      submitBtn.disabled = true;
      statusBar.innerHTML = '';

      const postOk = await sendPost(phone, company);
      sendMqtt(phone, company);

      // POST 성공 시 입력 초기화
      if (postOk) {
        phoneInput.value = '';
        document.getElementById('company').value = '';
      }

      submitBtn.disabled = false;
    });
  </script>
</body>

</html>
